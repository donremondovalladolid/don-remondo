  <text x="300" y="140" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#215220" opacity="0.6">DON REMONDO</text>
  <text x="300" y="370" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#215220" opacity="0.7">Foto: Tienda Valladolid</text>
